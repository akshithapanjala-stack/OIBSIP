<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TempVerse • Temperature Converter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#09122C,
#1E3A8A,
#0EA5E9
);

padding:30px;

}

.card{

width:480px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

padding:35px;

border-radius:28px;

color:white;

}

.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:28px;

}

.logo{

font-size:30px;

}

.title{

font-size:30px;

font-weight:800;

}

.small{

opacity:.7;

font-size:13px;

}

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:16px;

margin-top:10px;

font-size:18px;

}

.units{

display:flex;

gap:10px;

margin-top:18px;

}

.unit{

flex:1;

padding:14px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:700;

}

.active{

background:#38BDF8;

color:white;

}

.normal{

background:white;

}

button.convert{

width:100%;

margin-top:22px;

padding:18px;

border:none;

border-radius:18px;

font-size:18px;

font-weight:800;

background:
linear-gradient(
90deg,
#9333EA,
#3B82F6
);

color:white;

cursor:pointer;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

margin-top:28px;

}

.box{

padding:20px;

border-radius:20px;

background:

rgba(255,255,255,.12);

}

.big{

font-size:26px;

font-weight:800;

margin-top:10px;

}

.error{

margin-top:18px;

color:#FFD2D2;

}

.footer{

margin-top:25px;

text-align:center;

opacity:.7;

}

</style>

</head>

<body>

<div class="card">

<div class="top">

<div>

<div class="title">
TempVerse
</div>

<div class="small">
Smart Temperature Dashboard
</div>

</div>

<div class="logo">
🌡
</div>

</div>

<input
id="temp"
placeholder="Enter temperature">

<div class="units">

<button class="unit active"
onclick="choose('c',this)">
°C
</button>

<button class="unit normal"
onclick="choose('f',this)">
°F
</button>

<button class="unit normal"
onclick="choose('k',this)">
K
</button>

</div>

<button
class="convert"
onclick="convert()">

Convert

</button>

<div
class="error"
id="error">
</div>

<div class="grid">

<div class="box">

<div>Celsius</div>

<div
class="big"
id="c">

—

</div>

</div>

<div class="box">

<div>Fahrenheit</div>

<div
class="big"
id="f">

—

</div>

</div>

<div class="box">

<div>Kelvin</div>

<div
class="big"
id="k">

—

</div>

</div>

<div class="box">

<div>Weather Feel</div>

<div
class="big"
id="mood">

🙂

</div>

</div>

</div>

<div class="footer">

Unique UI • Glassmorphism • Validation

</div>

</div>

<script>

let current="c";

function choose(u,btn){

current=u;

document
.querySelectorAll(".unit")
.forEach(
b=>{
b.classList.remove("active");
b.classList.add("normal");
}
);

btn.classList.add("active");

}

function convert(){

let val=
document
.getElementById("temp")
.value
.trim();

let error=
document
.getElementById("error");

error.innerHTML="";

if(val===""){

error.innerHTML=
"Enter a temperature";

return;

}

if(isNaN(val)){

error.innerHTML=
"Numbers only";

return;

}

val=parseFloat(val);

let c,f,k;

if(current==="c"){

if(val<-273.15){

error.innerHTML=
"Below absolute zero";

return;

}

c=val;

f=(c*9/5)+32;

k=c+273.15;

}

if(current==="f"){

if(val<-459.67){

error.innerHTML=
"Below absolute zero";

return;

}

f=val;

c=(f-32)*5/9;

k=c+273.15;

}

if(current==="k"){

if(val<0){

error.innerHTML=
"Kelvin cannot be negative";

return;

}

k=val;

c=k-273.15;

f=(c*9/5)+32;

}

document.getElementById("c")
.innerHTML=
c.toFixed(1)+"°";

document.getElementById("f")
.innerHTML=
f.toFixed(1)+"°";

document.getElementById("k")
.innerHTML=
k.toFixed(1);

let mood="❄️";

if(c>10)
mood="🙂";

if(c>30)
mood="☀️";

if(c>40)
mood="🔥";

document
.getElementById("mood")
.innerHTML=
mood;

}

</script>

</body>

</html>
